<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <!-- CSP (F3): GitHub Pages erlaubt keine HTTP-Header, daher als Meta-Tag.
       WICHTIG für das Druckfenster: about:blank-Fenster ERBEN diese Richtlinie.
       style-src 'unsafe-inline' deckt die <style>-Blöcke des Druckfensters und
       Inline-Styles ab; img-src data: die Schülerfotos. frame-ancestors ist per
       Meta-Tag wirkungslos und daher bewusst weggelassen. -->
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self' https://openholidaysapi.org; object-src 'none'; base-uri 'none'; form-action 'none'">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>SOL-Noten – Notenverwaltung zum selbstorganisierten Lernen</title>
  <meta name="description" content="Notenverwaltung zum selbstorganisierten Lernen (SOL). Alle Daten bleiben lokal auf Ihrem Gerät.">
  <meta name="theme-color" content="#0e7c74">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icons/icon-192-v2.png">
  <link rel="apple-touch-icon" href="icons/icon-192-v2.png">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app" aria-live="polite"></div>
  <div id="toast-host"></div>
  <div id="modal-host"></div>
  <script src="js/calc.js"></script>
  <script src="js/cryptobox.js"></script>
  <script src="js/importer.js"></script>
  <script src="js/xlsxwrite.js"></script>
  <script src="js/photo.js"></script>
  <script src="js/quarters.js"></script>
  <script src="js/store.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
